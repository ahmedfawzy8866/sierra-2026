name: Build Verification

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: |
          cd apps/web
          pnpm run build
        env:
          # Use staging Firebase for build
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: sierra-blu-staging
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY_STAGING }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: sierra-blu-staging.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: sierra-blu-staging.appspot.com

      - name: Generate build report
        if: always()
        run: |
          echo "## Build Report" >> $GITHUB_STEP_SUMMARY
          echo "Build completed at $(date)" >> $GITHUB_STEP_SUMMARY
          echo "Node version: $(node -v)" >> $GITHUB_STEP_SUMMARY
          echo "pnpm version: $(pnpm -v)" >> $GITHUB_STEP_SUMMARY
