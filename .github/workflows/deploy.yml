name: Deploy to Firebase

on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pre-deployment checks
        run: pnpm validate-build

      - name: Build all apps
        run: NODE_OPTIONS=--max-old-space-size=8192 pnpm build
        env:
          NEXT_PUBLIC_ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

      - name: Load Firebase configuration
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "Deploying to PRODUCTION"
            echo "FIREBASE_PROJECT=sierra-blu-prod" >> $GITHUB_ENV
          else
            echo "Deploying to STAGING"
            echo "FIREBASE_PROJECT=sierra-blu-staging" >> $GITHUB_ENV
          fi

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --project ${{ env.FIREBASE_PROJECT }} --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Get deployment URL
        id: deployment
        run: |
          PROJECT=${{ env.FIREBASE_PROJECT }}
          echo "url=https://${PROJECT}.web.app" >> $GITHUB_OUTPUT

      - name: Comment on PR with deployment URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Deployment successful!\n\n**Preview**: ${{ steps.deployment.outputs.url }}'
            })

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Sierra Blu deployed successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Sierra Blu Platform - Deployment Success*\n\n*Environment*: ${{ env.FIREBASE_PROJECT }}\n*Commit*: ${{ github.sha }}\n*Branch*: ${{ github.ref_name }}\n*URL*: ${{ steps.deployment.outputs.url }}"
                  }
                }
              ]
            }

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Sierra Blu deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Sierra Blu Platform - Deployment Failed*\n\n*Environment*: ${{ env.FIREBASE_PROJECT }}\n*Commit*: ${{ github.sha }}\n*Branch*: ${{ github.ref_name }}\n*Error*: Check logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
