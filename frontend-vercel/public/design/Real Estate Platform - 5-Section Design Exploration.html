  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0A1628;
      color: #F4F0E8;
      line-height: 1.6;
    }

    /* Design Canvas Grid */
    .design-canvas {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 32px;
      padding: 48px;
      max-width: 100%;
    }

    .artboard {
      border: 2px solid #C9A84C;
      border-radius: 12px;
      overflow: hidden;
      background: #0A1628;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      aspect-ratio: 9 / 16;
      display: flex;
      flex-direction: column;
    }

    .artboard-header {
      padding: 16px;
      border-bottom: 1px solid #C9A84C;
      background: rgba(201, 168, 76, 0.1);
    }

    .artboard-header h3 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #C9A84C;
      margin-bottom: 4px;
    }

    .artboard-header p {
      font-size: 11px;
      color: #F4F0E8;
      opacity: 0.7;
    }

    .artboard-content {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    /* ─── SECTION 1: ONBOARDING & INTENT ─── */
    .onboarding-card {
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
    }

    .onboarding-hero {
      text-align: center;
      margin-bottom: 32px;
    }

    .onboarding-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-style: italic;
      margin-bottom: 12px;
      color: #F4F0E8;
    }

    .onboarding-hero p {
      font-size: 13px;
      color: #F4F0E8;
      opacity: 0.7;
      line-height: 1.5;
    }

    .intent-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .intent-btn {
      padding: 16px;
      border: 2px solid #C9A84C;
      background: transparent;
      color: #C9A84C;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
    }

    .intent-btn:hover {
      background: #C9A84C;
      color: #0A1628;
    }

    .intent-btn-icon {
      font-size: 20px;
      margin-bottom: 8px;
      display: block;
    }

    /* ─── SECTION 2: DUAL-VIEW COMMAND CENTER ─── */
    .dual-view {
      display: grid;
      grid-template-columns: 55% 45%;
      gap: 0;
      height: 100%;
      padding: 0;
    }

    .map-layer {
      background: linear-gradient(135deg, #1a2332 0%, #0f1621 100%);
      border-right: 1px solid #C9A84C;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #F4F0E8;
      opacity: 0.6;
      position: relative;
      overflow: hidden;
    }

    .map-placeholder {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 30% 50%, rgba(201, 168, 76, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(201, 168, 76, 0.08) 0%, transparent 50%);
    }

    .feed-layer {
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .property-card-mini {
      padding: 12px;
      border: 1px solid #C9A84C;
      border-radius: 6px;
      background: rgba(201, 168, 76, 0.05);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .property-card-mini:hover {
      background: rgba(201, 168, 76, 0.15);
      border-color: #C9A84C;
    }

    .property-card-mini-title {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #C9A84C;
    }

    .property-card-mini-details {
      font-size: 10px;
      color: #F4F0E8;
      opacity: 0.7;
    }

    /* ─── SECTION 3: IMMERSIVE PROPERTY PROFILE ─── */
    .property-profile {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .hero-stack {
      height: 200px;
      background: linear-gradient(135deg, #C9A84C 0%, #A8844C 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #0A1628;
      font-weight: 600;
      position: relative;
      overflow: hidden;
    }

    .hero-stack::before {
      content: '';
      position: absolute;
      inset: 0;

      opacity: 0.3;
    }

    .property-details {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 11px;
    }

    .detail-item {
      padding: 8px;
      background: rgba(201, 168, 76, 0.05);
      border: 1px solid #C9A84C;
      border-radius: 4px;
      text-align: center;
    }

    .detail-label {
      font-size: 9px;
      color: #F4F0E8;
      opacity: 0.6;
      margin-bottom: 4px;
    }

    .detail-value {
      font-weight: 600;
      color: #C9A84C;
      font-size: 12px;
    }

    /* ─── SECTION 4: FINTECH TERMINAL ─── */
    .fintech-terminal {
      display: flex;
      flex-direction: column;
      padding: 16px;
      height: 100%;
      overflow-y: auto;
    }

    .cost-breakdown {
      margin-bottom: 16px;
    }

    .cost-breakdown h4 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #C9A84C;
      margin-bottom: 8px;

    .cost-line {

      justify-content: space-between;
      padding: 6px 0;
      font-size: 11px;
      border-bottom: 1px solid #C9A84C;
      opacity: 0.8;
      margin-bottom: 4px;

    .cost-line.total {
      font-weight: 600;
      color: #C9A84C;
    }

      padding: 8px;
      background: rgba(201, 168, 76, 0.1);
      border: 1px solid #C9A84C;
      border-radius: 4px;
      font-size: 9px;
      color: #F4F0E8;
      margin-bottom: 8px;
    }

      display: flex;
      flex-direction: column;
      padding: 16px;
      height: 100%;
      overflow-y: auto;
    }

    .cobuyer-status {
      text-align: center;
      margin-bottom: 16px;
    }

    .cobuyer-status-badge {
      display: inline-block;
      padding: 6px 12px;
      background: rgba(201, 168, 76, 0.2);
      border: 1px solid #C9A84C;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      color: #C9A84C;
      margin-bottom: 8px;
    }

    .voting-card {
      padding: 12px;
      background: rgba(201, 168, 76, 0.05);
      border: 1px solid #C9A84C;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .voting-title {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #C9A84C;
    }

    .voting-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .vote-btn {
      padding: 6px;
      border: 1px solid #C9A84C;
      background: transparent;
      color: #C9A84C;
      border-radius: 4px;
      font-size: 9px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .vote-btn:hover {
      background: #C9A84C;
      color: #0A1628;
    }

    /* ─── VARIATIONS ─── */
    .section-title {
      padding: 32px 48px 16px;
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-style: italic;
      color: #C9A84C;
      border-bottom: 2px solid #C9A84C;
      margin-top: 32px;
    }

    .section-subtitle {
      padding: 8px 48px;
      font-size: 12px;
      color: #F4F0E8;
      opacity: 0.7;
      margin-bottom: 16px;
    }

    /* Variation Labels */

      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 8px;
      background: #C9A84C;
      color: #0A1628;
      font-size: 9px;
      font-weight: 700;
      border-radius: 3px;
      text-transform: uppercase;
    }

    .artboard {

    .feed-layer::-webkit-scrollbar,
    .property-details::-webkit-scrollbar,
    .fintech-terminal::-webkit-scrollbar,

      width: 6px;
    }

    .artboard-content::-webkit-scrollbar-track,
    .feed-layer::-webkit-scrollbar-track,
    .property-details::-webkit-scrollbar-track,
    .fintech-terminal::-webkit-scrollbar-track,
    .cobuyer-hub::-webkit-scrollbar-track {

    }

    .artboard-content::-webkit-scrollbar-thumb,
    .feed-layer::-webkit-scrollbar-thumb,
    .property-details::-webkit-scrollbar-thumb,
    .fintech-terminal::-webkit-scrollbar-thumb,
    .cobuyer-hub::-webkit-scrollbar-thumb {
      background: #C9A84C;
      border-radius: 3px;
    }

    @media (max-width: 1200px) {
      .design-canvas {
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      }
    }

    @media (max-width: 768px) {
      .design-canvas {
        grid-template-columns: 1fr;
        padding: 24px;
        gap: 24px;
      }
    }
  </style>
</head>
