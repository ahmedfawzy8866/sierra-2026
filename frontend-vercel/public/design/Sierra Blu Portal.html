<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sierra Estates Portal — Smart Property Matching</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --navy-deep: #050B14;
    --navy-mid: #071422;
    --navy-soft: #0D1E36;
    --ivory: #F4F0E8;
    --gold: #C8961A;
    --gold-light: #E9C176;
    --red: #E63946;
    --red-deep: #B71C2C;
    --sierra-estatese: #1E88D9;
  }
  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  html, body { background: var(--navy-deep); }
  body { font-family: 'Inter', sans-serif; color: var(--ivory); }
  .font-serif { font-family: 'Cormorant Garamond', serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  [dir="rtl"] body { font-family: 'Cairo', sans-serif; }

  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--navy-mid); }
  ::-webkit-scrollbar-thumb { background: rgba(200,150,26,0.4); border-radius: 5px; }

  .ease-silk { transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(230,57,70,0.5); }
    50% { box-shadow: 0 0 0 10px rgba(230,57,70,0); }
  }
  .pulse-red { animation: pulse-glow 2s ease-in-out infinite; }

  @keyframes aura-pulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.08); }
  }

  /* Hero background heavily blurred */
  .hero-bg {
    position: relative;
    isolation: isolate;
  }
  .hero-bg::before {
    content: '';
    position: absolute;
    inset: -40px;
    z-index: -2;
    background-image: url('https://images.unsplash.com/photo-1571841418516-37a8e9c2c0db?w=2400&q=85&auto=format&fit=crop');
    background-size: cover;
    background-position: center 35%;
    filter: blur(20px) saturate(1.2) brightness(0.45);
    transform: scale(1.1);
  }
  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(ellipse at center 35%, rgba(5,11,20,0.3) 0%, rgba(5,11,20,0.75) 55%, rgba(5,11,20,0.98) 100%),
      linear-gradient(180deg, rgba(5,11,20,0.4) 0%, transparent 35%, transparent 65%, rgba(5,11,20,1) 100%);
  }

  /* Logo aura */
  .logo-aura {
    position: relative;
  }
  .logo-aura::before {
    content: '';
    position: absolute;
    inset: -80px;
    background: radial-gradient(circle at center, rgba(230,57,70,0.35) 0%, rgba(200,150,26,0.12) 45%, transparent 75%);
    z-index: -1;
    animation: aura-pulse 4s ease-in-out infinite;
  }

  .red-glow {
    filter: drop-shadow(0 4px 20px rgba(230,57,70,0.6)) drop-shadow(0 0 50px rgba(230,57,70,0.4)) drop-shadow(0 0 100px rgba(230,57,70,0.2));
  }

  /* Dropdown filter styles */
  .dropdown-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 0.75rem;
    cursor: pointer;
    transition: all 300ms cubic-bezier(0.16,1,0.3,1);
  }
  .dropdown-header:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(200,150,26,0.3);
  }
  .dropdown-header.open {
    border-color: rgba(200,150,26,0.5);
    background: rgba(200,150,26,0.08);
  }

  .dropdown-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 400ms cubic-bezier(0.16,1,0.3,1);
  }
  .dropdown-content.open {
    max-height: 400px;
  }

  /* Modal backdrop for mobile */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(5,11,20,0.7);
    backdrop-filter: blur(8px);
    z-index: 40;
    animation: fadeIn 300ms ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .bottom-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-height: 85vh;
    background: var(--navy-deep);
    border-top: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px 24px 0 0;
    z-index: 50;
    overflow-y: auto;
    animation: slideUp 400ms cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .tweak-badge {
    position: fixed;
    bottom-right: 20px;
    font-size: 11px;
    text-transform: uppercase;
    tracking-widest: true;
    color: rgba(200,150,26,0.6);
    pointer-events: none;
    z-index: 5;
  }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 320px;
    max-height: 600px;
    background: rgba(7,20,34,0.95);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(200,150,26,0.25);
    border-radius: 16px;
    padding: 16px;
    overflow-y: auto;
    z-index: 45;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: slideUpTweaks 500ms cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes slideUpTweaks { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .tweaks-panel.hidden { display: none; }

  .tweak-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(244,240,232,0.15);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .tweak-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: linear-gradient(135deg, #E9C176, #C8961A);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(200,150,26,0.5);
  }

  /* Smooth reveal */
  .reveal { opacity: 0; transform: translateY(12px); animation: reveal 600ms cubic-bezier(0.16,1,0.3,1) forwards; }
  @keyframes reveal { to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "#C8961A",
  "accentColor": "#E63946",
  "logoSize": 200,
  "filterLayout": "dropdown",
  "heroBlur": 20,
  "replyTime": "4 seconds",
  "heroTitle": "Find Your Home in Cairo"
}/*EDITMODE-END*/;

// ─── ICONS ────────────────────────────────────────────────────────────
const I = {
  Search: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>),
  ChevronDown: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m6 9 6 6 6-6"/></svg>),
  Zap: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>),
  X: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>),
  Sliders: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>),
  Bed: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>),
  Bath: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 4 8 6"/><path d="M17 19v2"/><path d="M2 12h20"/><path d="M7 19v2"/><path d="M9 5 7.621 3.621A2.121 2.121 0 0 0 4 5v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5"/></svg>),
  Clock: (p) => (<svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>),
};

const INVENTORY = [
  {id:1,code:'MVD-01',compound:'Madinaty',titleEn:'Aurora Penthouse',price:8500000,purpose:'RESALE',type:'Penthouse',beds:4,baths:3,area:'320',furnish:'semi',img:'https://images.unsplash.com/photo-1613490493576-7fde63acd811?w=900&q=80',lat:30.0972,lng:31.6314,ai:9.2},
  {id:2,code:'MV-02',compound:'Mountain View',titleEn:'Villa Lumière',price:14200000,purpose:'RESALE',type:'Villa',beds:5,baths:4,area:'480',furnish:'empty',img:'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=900&q=80',lat:30.0320,lng:31.4720,ai:9.6},
  {id:3,code:'UTC-03',compound:'Uptown Cairo',titleEn:'Uptown Twin House',price:12800000,purpose:'RESALE',type:'Twin House',beds:4,baths:4,area:'400',furnish:'semi',img:'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=900&q=80',lat:30.0150,lng:31.3050,ai:9.4},
  {id:4,code:'HP-04',compound:'Hyde Park',titleEn:'Emirates Crown',price:22000000,purpose:'RESALE',type:'Villa',beds:6,baths:5,area:'650',furnish:'furnished',img:'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=900&q=80',lat:30.0071,lng:31.4345,ai:9.8},
  {id:5,code:'MVD-05',compound:'Mivida',titleEn:'Mivida Duplex',price:6200000,purpose:'RENT',type:'Duplex',beds:3,baths:3,area:'280',furnish:'furnished',img:'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=900&q=80',lat:30.0150,lng:31.5050,ai:8.9},
];

// ─── DROPDOWN FILTER ITEM ─────────────────────────────────────────────
function FilterDropdown({label, children, initialOpen=false}) {
  const [open, setOpen] = useState(initialOpen);
  return (
    <div>
      <button onClick={()=>setOpen(!open)} className={`dropdown-header w-full ${open?'open':''}`}>
        <span className="text-xs font-semibold uppercase tracking-[0.15em] text-white/90">{label}</span>
        <I.ChevronDown className={`w-4 h-4 text-[var(--primary-color)] transition-transform ${open?'rotate-180':''}`}/>
      </button>
      <div className={`dropdown-content ${open?'open':''} mt-2 bg-white/[0.03] border border-white/8 rounded-lg overflow-hidden`}>
        <div className="p-3 space-y-2">{children}</div>
      </div>
    </div>
  );
}

// ─── SMART FILTER (COMPACT DROPDOWNS) ──────────────────────────────────
function SmartFilterDropdown({filters, setFilters, matchCount, tweaks}) {
  const [isMobileOpen, setIsMobileOpen] = useState(false);

  const FilterContent = () => (
    <div className="space-y-4">
      {/* PURPOSE */}
      <FilterDropdown label="Purpose">
        {['All','Rent','Resale'].map(p=>(
          <label key={p} className="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox" checked={filters.purpose===p} onChange={()=>setFilters({...filters,purpose:p})} className="w-4 h-4 rounded border-white/20 accent-[var(--primary-color)]"/>
            <span className="text-xs text-white/75 group-hover:text-white transition-colors">{p}</span>
          </label>
        ))}
      </FilterDropdown>

      {/* TYPE */}
      <FilterDropdown label="Property Type">
        {['Standalone','Duplex','Twin House','Townhouse','Villa','Penthouse','Apartment'].map(t=>(
          <label key={t} className="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox" checked={filters.types.includes(t)} onChange={(e)=>{
              if(e.target.checked) setFilters({...filters,types:[...filters.types,t]});
              else setFilters({...filters,types:filters.types.filter(x=>x!==t)});
            }} className="w-4 h-4 rounded border-white/20 accent-[var(--primary-color)]"/>
            <span className="text-xs text-white/75 group-hover:text-white transition-colors">{t}</span>
          </label>
        ))}
      </FilterDropdown>

      {/* COMPOUND */}
      <FilterDropdown label="Compound">
        {['Mivida','Eastown','Madinaty','Uptown Cairo','Mountain View','Hyde Park','Mostakbal'].map(c=>(
          <label key={c} className="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox" checked={filters.compounds.includes(c)} onChange={(e)=>{
              if(e.target.checked) setFilters({...filters,compounds:[...filters.compounds,c]});
              else setFilters({...filters,compounds:filters.compounds.filter(x=>x!==c)});
            }} className="w-4 h-4 rounded border-white/20 accent-[var(--primary-color)]"/>
            <span className="text-xs text-white/75 group-hover:text-white transition-colors">{c}</span>
          </label>
        ))}
      </FilterDropdown>

      {/* BEDS */}
      <FilterDropdown label="Bedrooms">
        {['Any',1,2,3,4,5,6].map(b=>(
          <label key={b} className="flex items-center gap-2 cursor-pointer group">
            <input type="radio" name="beds" checked={filters.beds===b} onChange={()=>setFilters({...filters,beds:b})} className="w-4 h-4 rounded-full border-white/20 accent-[var(--primary-color)]"/>
            <span className="text-xs text-white/75 group-hover:text-white transition-colors">{b==='Any'?'Any':b+(b===6?'+':'')}</span>
          </label>
        ))}
      </FilterDropdown>

      {/* FURNISH */}
      <FilterDropdown label="Furnishing">
        {['Furnished','Semi-Furnished','Empty'].map(f=>(
          <label key={f} className="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox" checked={filters.furnish.includes(f)} onChange={(e)=>{
              if(e.target.checked) setFilters({...filters,furnish:[...filters.furnish,f]});
              else setFilters({...filters,furnish:filters.furnish.filter(x=>x!==f)});
            }} className="w-4 h-4 rounded border-white/20 accent-[var(--primary-color)]"/>
            <span className="text-xs text-white/75 group-hover:text-white transition-colors">{f}</span>
          </label>
        ))}
      </FilterDropdown>

      {/* BUDGET */}
      <FilterDropdown label="Budget Range" initialOpen>
        <div className="space-y-3">
          <div className="flex justify-between items-center mb-2">
            <span className="text-[10px] font-mono text-white/60">1M</span>
            <span className="text-sm font-bold text-[var(--primary-color)]">EGP {(filters.budget/1000000).toFixed(1)}M</span>
            <span className="text-[10px] font-mono text-white/60">50M</span>
          </div>
          <input type="range" min="1000000" max="50000000" step="500000" value={filters.budget} onChange={(e)=>setFilters({...filters,budget:Number(e.target.value)})} className="tweak-slider w-full"/>
        </div>
      </FilterDropdown>

      {/* NOTICE */}
      <FilterDropdown label="Notice Period">
        {['Immediate','1 Month','3 Months','Flexible'].map(n=>(
          <label key={n} className="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox" checked={filters.notice.includes(n)} onChange={(e)=>{
              if(e.target.checked) setFilters({...filters,notice:[...filters.notice,n]});
              else setFilters({...filters,notice:filters.notice.filter(x=>x!==n)});
            }} className="w-4 h-4 rounded border-white/20 accent-[var(--primary-color)]"/>
            <span className="text-xs text-white/75 group-hover:text-white transition-colors">{n}</span>
          </label>
        ))}
      </FilterDropdown>

      {/* ACTIONS */}
      <div className="flex gap-2 pt-3 border-t border-white/8">
        <button onClick={()=>setFilters({purpose:'All',types:[],compounds:[],beds:'Any',furnish:[],budget:25000000,notice:[]})} className="flex-1 px-3 py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg text-[10px] font-bold uppercase tracking-[0.15em] transition-all">Reset</button>
        <button onClick={()=>setIsMobileOpen(false)} className="flex-1 px-3 py-2 bg-[var(--primary-color)] hover:bg-[var(--primary-color-light)] text-[#050B14] rounded-lg text-[10px] font-bold uppercase tracking-[0.15em] transition-all">Apply</button>
      </div>
    </div>
  );

  return (
    <div>
      {/* Desktop: Sidebar */}
      <aside className="hidden md:flex md:flex-col gap-6">
        <h3 className="text-sm font-bold uppercase tracking-[0.2em] text-white flex items-center gap-2">
          <I.Sliders className="w-4 h-4 text-[var(--primary-color)]"/>
          Smart Filter
        </h3>
        <div className="space-y-4 max-h-[calc(100vh-200px)] overflow-y-auto">
          <FilterContent/>
        </div>
      </aside>

      {/* Mobile: Bottom sheet */}
      {isMobileOpen && (
        <>
          <div className="modal-backdrop md:hidden" onClick={()=>setIsMobileOpen(false)}></div>
          <div className="bottom-sheet md:hidden">
            <div className="sticky top-0 bg-[#050B14] border-b border-white/8 p-4 flex items-center justify-between">
              <h3 className="text-sm font-bold uppercase tracking-[0.2em] text-white">Smart Filter</h3>
              <button onClick={()=>setIsMobileOpen(false)} className="p-1 hover:bg-white/10 rounded-lg"><I.X className="w-5 h-5"/></button>
            </div>
            <div className="p-4 space-y-4">
              <FilterContent/>
            </div>
          </div>
        </>
      )}

      {/* Mobile toggle button */}
      <button onClick={()=>setIsMobileOpen(true)} className="md:hidden fixed bottom-24 left-6 right-6 py-3 bg-gradient-to-r from-[var(--primary-color)] to-[var(--primary-color-light)] text-[#050B14] rounded-xl font-bold text-[11px] uppercase tracking-[0.18em] flex items-center justify-center gap-2 shadow-lg">
        <I.Sliders className="w-4 h-4"/>
        Open Smart Filter
      </button>

      {/* Match count badge */}
      <div className="md:hidden fixed bottom-8 left-6 right-6 px-4 py-2 bg-emerald-500/20 border border-emerald-500/40 rounded-lg text-center">
        <span className="text-[10px] font-mono font-bold text-emerald-400">{matchCount} MATCHES FOUND</span>
      </div>
    </div>
  );
}

// ─── HERO ─────────────────────────────────────────────────────────────
function Hero({tweaks}) {
  const [mouse, setMouse] = useState({x:0,y:0});
  const ref = useRef(null);

  const onMove = (e) => {
    if (!ref.current) return;
    const r = ref.current.getBoundingClientRect();
    setMouse({
      x: ((e.clientX - r.left) / r.width - 0.5) * 2,
      y: ((e.clientY - r.top) / r.height - 0.5) * 2,
    });
  };

  return (
    <section ref={ref} onMouseMove={onMove} onMouseLeave={()=>setMouse({x:0,y:0})}
      className="relative min-h-[70vh] w-full flex flex-col justify-center items-center text-center px-6 overflow-hidden hero-bg"
      style={{['--blur' as any]: tweaks.heroBlur + 'px'}}
    >
      {/* Logo aura */}
      <div className="logo-aura mb-6">
        <img src="assets/logo-red.png" alt="Sierra Estates" style={{width:tweaks.logoSize, height:'auto'}} className="red-glow select-none mx-auto" draggable="false"/>
      </div>

      {/* Badge */}
      <div className="inline-flex items-center gap-2 bg-white/5 border border-white/15 backdrop-blur-md px-5 py-2 rounded-full mb-6">
        <I.Zap className="w-3.5 h-3.5" style={{color:tweaks.accentColor}}/>
        <span style={{color:tweaks.accentColor}} className="tracking-[0.22em] uppercase text-[10px] font-mono font-semibold">Replies within {tweaks.replyTime}</span>
      </div>

      {/* Headline */}
      <h1 className="font-serif text-white leading-[1.08] tracking-tight font-light max-w-4xl">
        <span className="block text-4xl sm:text-6xl md:text-7xl">{tweaks.heroTitle}</span>
        <span className="block text-lg sm:text-2xl md:text-3xl text-white/50 font-light mt-3">Intelligent matching. Fast. Refined.</span>
      </h1>

      {/* Live match count (hero section) */}
      <div className="mt-8 inline-flex items-center gap-3 bg-white/[0.03] border border-white/10 px-6 py-3 rounded-full">
        <span className="w-2 h-2 rounded-full bg-emerald-400 pulse-red"></span>
        <span className="text-[10px] font-mono uppercase tracking-[0.18em] text-white/60">Live Matching Engine</span>
      </div>
    </section>
  );
}

// ─── LISTINGS ─────────────────────────────────────────────────────────
function Listings({list}) {
  return (
    <section id="results" className="py-20 px-6 md:px-12 max-w-[1500px] mx-auto">
      <div className="mb-12">
        <h2 className="font-serif text-3xl md:text-5xl text-white tracking-tight font-light">Results</h2>
        <p className="text-white/50 text-sm mt-2">{list.length} properties match your criteria</p>
      </div>

      {list.length===0 ? (
        <div className="text-center py-16">
          <I.Search className="w-12 h-12 text-white/20 mx-auto mb-4"/>
          <p className="text-white/40 text-sm">No properties match. Adjust your filters.</p>
        </div>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
          {list.map((p,i)=>(
            <div key={p.id} className="reveal" style={{animationDelay:`${i*100}ms`}}>
              <div className="bg-white/[0.03] border border-white/8 hover:border-white/20 rounded-2xl overflow-hidden transition-all cursor-pointer group">
                <div className="relative h-56 overflow-hidden bg-white/5">
                  <img src={p.img} alt="" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>
                </div>
                <div className="p-6">
                  <div className="flex justify-between items-start mb-3">
                    <div>
                      <p className="text-xs font-mono text-white/50 mb-1">{p.code} · {p.compound}</p>
                      <h3 className="font-serif text-xl text-white font-semibold">{p.titleEn}</h3>
                    </div>
                    <span className="text-[10px] font-bold px-2.5 py-1 rounded-full bg-emerald-500/20 text-emerald-400">AI {p.ai}</span>
                  </div>
                  <p className="text-sm font-bold text-white mb-4">EGP {(p.price/1000000).toFixed(1)}M</p>
                  <div className="flex gap-4 text-[10px] text-white/60">
                    <span className="flex items-center gap-1"><I.Bed className="w-4 h-4"/> {p.beds} bd</span>
                    <span className="flex items-center gap-1"><I.Bath className="w-4 h-4"/> {p.baths} ba</span>
                    <span>{p.area}m²</span>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </section>
  );
}

// ─── TWEAKS PANEL ────────────────────────────────────────────────────
function TweaksPanel({tweaks, setTweaks, visible}) {
  return (
    <div className={`tweaks-panel ${visible?'':'hidden'}`}>
      <h4 className="text-xs font-bold uppercase tracking-[0.2em] text-[var(--primary-color)] mb-4">Tweaks</h4>

      <div className="space-y-4 text-[11px]">
        {/* Primary Color */}
        <div>
          <label className="text-white/70 font-medium block mb-2">Primary Color</label>
          <div className="flex gap-2">
            {['#C8961A','#1E88D9','#E63946'].map(c=>(
              <button key={c} onClick={()=>{setTweaks({...tweaks,primaryColor:c}); window.parent.postMessage({type:'__edit_mode_set_keys',edits:{primaryColor:c}},'*');}} style={{background:c}} className={`w-8 h-8 rounded-lg border-2 ${tweaks.primaryColor===c?'border-white':'border-transparent'}`}></button>
            ))}
          </div>
        </div>

        {/* Logo Size */}
        <div>
          <label className="text-white/70 font-medium block mb-2">Logo Size ({tweaks.logoSize}px)</label>
          <input type="range" min="120" max="280" value={tweaks.logoSize} onChange={(e)=>{setTweaks({...tweaks,logoSize:Number(e.target.value)}); window.parent.postMessage({type:'__edit_mode_set_keys',edits:{logoSize:Number(e.target.value)}},'*');}} className="tweak-slider w-full"/>
        </div>

        {/* Reply Time */}
        <div>
          <label className="text-white/70 font-medium block mb-2">Reply Time</label>
          <select value={tweaks.replyTime} onChange={(e)=>{setTweaks({...tweaks,replyTime:e.target.value}); window.parent.postMessage({type:'__edit_mode_set_keys',edits:{replyTime:e.target.value}},'*');}} className="w-full px-2 py-1 bg-white/5 border border-white/10 rounded text-white text-xs">
            <option>4 seconds</option>
            <option>1-2 minutes</option>
            <option>same-day</option>
          </select>
        </div>

        {/* Hero Title */}
        <div>
          <label className="text-white/70 font-medium block mb-2">Hero Title</label>
          <input type="text" value={tweaks.heroTitle} onChange={(e)=>{setTweaks({...tweaks,heroTitle:e.target.value}); window.parent.postMessage({type:'__edit_mode_set_keys',edits:{heroTitle:e.target.value}},'*');}} className="w-full px-3 py-2 bg-white/5 border border-white/10 rounded text-white text-xs outline-none focus:border-white/30"/>
        </div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [filters, setFilters] = useState({purpose:'All',types:[],compounds:[],beds:'Any',furnish:[],budget:25000000,notice:[]});

  const filtered = useMemo(()=>{
    return INVENTORY.filter(p=>{
      if(filters.purpose!=='All' && p.purpose!==filters.purpose) return false;
      if(filters.types.length && !filters.types.includes(p.type)) return false;
      if(filters.compounds.length && !filters.compounds.includes(p.compound)) return false;
      if(filters.beds!=='Any' && p.beds<filters.beds) return false;
      if(filters.furnish.length && !filters.furnish.includes(p.furnish)) return false;
      if(p.price>filters.budget) return false;
      if(filters.notice.length && !filters.notice.includes(p.notice)) return false;
      return true;
    });
  },[filters]);

  // Register Tweaks listener
  useEffect(()=>{
    window.addEventListener('message', (e)=>{
      if(e.data.type==='__activate_edit_mode') setTweaksVisible(true);
      if(e.data.type==='__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');
  },[]);

  // CSS variables for tweaks
  useEffect(()=>{
    document.documentElement.style.setProperty('--primary-color', tweaks.primaryColor);
    document.documentElement.style.setProperty('--primary-color-light', tweaks.primaryColor==='#C8961A'?'#E9C176':tweaks.primaryColor==='#1E88D9'?'#42A5F5':'#FF7A8A');
    document.documentElement.style.setProperty('--accent-color', tweaks.accentColor);
  },[tweaks]);

  return (
    <div className="min-h-screen bg-[#050B14] text-white">
      <Hero tweaks={tweaks}/>

      <div className="max-w-[1500px] mx-auto px-6 md:px-12 py-16 grid md:grid-cols-[1fr_2fr] gap-12">
        <SmartFilterDropdown filters={filters} setFilters={setFilters} matchCount={filtered.length} tweaks={tweaks}/>
        <div>
          <Listings list={filtered}/>
        </div>
      </div>

      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
