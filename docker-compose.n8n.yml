version: '3.8'

# 🌌 Sierra Blu 2027 — Self-Hosted n8n Workflow Automation Engine
# Usage:
#   docker-compose -f docker-compose.n8n.yml up -d
#
# Dashboard will be available at: http://localhost:5678

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: sierra-blu-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_SECURE_COOKIE=false # Set to true when running over HTTPS (production)
      - GENERIC_TIMEZONE=Africa/Cairo
      - TZ=Africa/Cairo
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
    name: sierra_blu_n8n_data
